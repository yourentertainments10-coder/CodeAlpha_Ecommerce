{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}E-commerce{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="{% url 'home' %}">E-commerce</a>
      <form class="nav-search" method="get" action="{% url 'home' %}" role="search">
        <input class="nav-search-input" type="search" name="q" placeholder="Search products..." value="{{ request.GET.q|default:'' }}">
        <button class="nav-search-btn" type="submit">Search</button>
      </form>
      <div class="nav-right">
        <a class="nav-link" href="{% url 'cart_detail' %}">Cart</a>
        {% if user.is_authenticated %}
          <a class="nav-link" href="{% url 'order_history' %}">Orders</a>
          <a class="nav-link" href="{% url 'logout' %}">Logout</a>
        {% else %}
          <a class="nav-link" href="{% url 'login' %}">Login</a>
        {% endif %}
      </div>
    </nav>
  </header>

  <main class="container">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="alert {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
